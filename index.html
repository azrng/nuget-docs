<!DOCTYPE html>
<html>

<head>
  <title>Doc</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>

<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      //logo: 'https://gitee.com/azrng/picture-storage/raw/master/img/icon.svg', //网站侧边栏logo 
      name: 'Nuget',// 侧边栏网站名称 还可以包含html
      repo: 'https://gitee.com/AZRNG', // 右上角添加小部件
      coverpage: false,//是否激活封面功能
      onlyCover: false, // 访问主页时候只加载封面
      nameLink: '/nuget',
      loadSidebar: true,// 是否启用侧边栏
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      maxLevel: 2,
      subMaxLevel: 0, // 单个文件生成目录的最大层级
      auto2top: true,//切换文档时候是否要到文档顶部
      //externalLinkTarget: '_blank', // default: '_blank'   本身打开：'_self打开外部链接方式 
      //basePath: '/',// 更改网页基本路径
      notFoundPage: true, //启动404页面  也可以直接自定义404页面
      topMargin: 0, // default: 0 滚动内容页面以到达所选部分时，在顶部添加一个空格。
    }
  </script>
  <script>
    window.$docsify = {
      search: 'auto', // 默认值

      search: {
        maxAge: 86400000,
        paths: auto,
        placeholder: '您要搜索吗',
        noData: '亲，找不到结果幺',
        depth: 4,
        hideOtherSidebarContent: false,
        namespace: 'azrng.github.io',
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>

  <!-- Music-->
